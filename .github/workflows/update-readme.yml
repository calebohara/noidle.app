name: update-readme

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-readme
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Inject latest release into README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Fetch metadata into env vars (NEVER interpolate the body into a
          # shell heredoc — a release body containing $(curl ...) would
          # execute on the runner). Python reads everything via os.environ.
          export TAG=$(gh release view --repo "$REPO" --json tagName -q .tagName)
          export NAME=$(gh release view --repo "$REPO" --json name -q .name)
          export PUBLISHED=$(gh release view --repo "$REPO" --json publishedAt -q .publishedAt)
          export URL=$(gh release view --repo "$REPO" --json url -q .url)
          # `gh ... -q .body` already pre-renders raw markdown without shell
          # expansion. Pipe via head to cap size, then export for Python.
          export BODY=$(gh release view --repo "$REPO" --json body -q .body | head -c 1500)

          python3 - <<'PY'
          import os, re, pathlib
          tag = os.environ["TAG"]
          name = os.environ.get("NAME") or tag
          published = os.environ["PUBLISHED"]
          url = os.environ["URL"]
          body = os.environ.get("BODY", "")

          block = (
              "<!-- LATEST_RELEASE_START -->\n"
              "<!-- This block is auto-updated by .github/workflows/update-readme.yml on every release. -->\n"
              "\n"
              f"### Latest release: [`{tag}`]({url}) — {name}\n"
              f"Published: `{published}`\n"
              "\n"
              "<details>\n"
              "<summary>Release notes</summary>\n"
              "\n"
              f"{body}\n"
              "\n"
              "</details>\n"
              "\n"
              "<!-- LATEST_RELEASE_END -->"
          )

          p = pathlib.Path("README.md")
          text = p.read_text()
          new = re.sub(
              r"<!-- LATEST_RELEASE_START -->.*?<!-- LATEST_RELEASE_END -->",
              # re.escape would clobber the rendered text, but we never feed
              # `block` to a regex pattern — only as the replacement.
              # However `re.sub` interprets backreferences in `repl`, so
              # neutralize any backslash sequences that could come from the
              # release body.
              lambda _m: block,
              text,
              flags=re.DOTALL,
          )
          if new != text:
              p.write_text(new)
              print("README updated")
          else:
              print("No change")
          PY
        shell: bash

      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet README.md; then
            echo "Nothing to commit"
            exit 0
          fi
          git add README.md
          git commit -m "docs(readme): auto-update for release ${{ github.event.release.tag_name || 'manual' }} [skip ci]"
          git push origin main
