name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write   # for cosign keyless signing via GitHub OIDC

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        # PyInstaller is pinned so a breaking PyInstaller release doesn't
        # brick all builds at once. Bump deliberately (test locally first).
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt "pyinstaller==6.11.1"

      - name: Generate icon (if not committed)
        shell: bash
        run: |
          if [ ! -f assets/icon.ico ]; then
            mkdir -p assets
            python scripts/make_icon.py
          fi

      - name: Build with PyInstaller
        # --collect-submodules zig replaces the brittle hand-maintained list of
        # --hidden-import flags. Adding a new src/zig/foo.py module is now picked
        # up automatically by the bundle (and by the smoke test, which uses
        # pkgutil.iter_modules to mirror the same discovery).
        run: pyinstaller --onefile --noconsole --name noidle --icon assets/icon.ico --add-data "assets;assets" --paths src --collect-submodules zig noidle.py

      - name: Smoke-test built .exe (--smoke imports everything and exits 0)
        # --noconsole strips stdout from the .exe; we ALSO build a console
        # shim ("noidle-debug.exe") so a smoke failure produces a real
        # diagnostic in the Actions log instead of just an exit code. The
        # debug exe is NOT shipped — it's deleted before artifact upload.
        shell: pwsh
        run: |
          $exe = "dist/noidle.exe"
          if (-not (Test-Path $exe)) { Write-Error "Build produced no exe"; exit 1 }

          # Build a parallel console-mode exe purely for capturing smoke output.
          pyinstaller --onefile --console --name noidle-debug --paths src --collect-submodules zig noidle.py
          $dbg = "dist/noidle-debug.exe"
          if (-not (Test-Path $dbg)) { Write-Error "Debug exe build failed"; exit 1 }

          # Run the debug exe so we can see stdout if smoke fails.
          $p = Start-Process -FilePath $dbg -ArgumentList "--smoke" -Wait -PassThru -NoNewWindow -RedirectStandardOutput smoke-out.txt -RedirectStandardError smoke-err.txt
          Write-Host "--- smoke stdout ---"
          if (Test-Path smoke-out.txt) { Get-Content smoke-out.txt }
          Write-Host "--- smoke stderr ---"
          if (Test-Path smoke-err.txt) { Get-Content smoke-err.txt }
          Write-Host "Exit code: $($p.ExitCode)"

          if ($p.ExitCode -ne 0) {
            Write-Error "noidle-debug.exe --smoke failed with exit $($p.ExitCode). Refusing to publish."
            exit 1
          }

          # Sanity: also run the real --noconsole exe and confirm it exits 0.
          $p2 = Start-Process -FilePath $exe -ArgumentList "--smoke" -Wait -PassThru -NoNewWindow
          if ($p2.ExitCode -ne 0) {
            Write-Error "noidle.exe (--noconsole) --smoke failed with exit $($p2.ExitCode). Refusing to publish."
            exit 1
          }

          # Don't ship the debug exe.
          Remove-Item $dbg -Force

      - name: Compute MSI version
        id: msi_version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            v="${GITHUB_REF#refs/tags/v}"
          else
            v="0.0.0"
          fi
          # WiX requires N.N.N or N.N.N.N — strip any pre-release suffix.
          v="${v%%-*}"
          echo "version=${v}" >> "$GITHUB_OUTPUT"
          echo "Using MSI version: ${v}"

      - name: Install WiX Toolset (pinned to v4; v7 requires OSMF EULA)
        shell: pwsh
        run: dotnet tool install --global wix --version 4.0.5

      - name: Build MSI
        shell: pwsh
        run: |
          $version = "${{ steps.msi_version.outputs.version }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          wix build installer/noidle.wxs -arch x64 -out dist/noidle.msi -d Version=$version
          if (-not (Test-Path "dist/noidle.msi")) {
            Write-Error "WiX did not produce dist/noidle.msi"
            exit 1
          }

      - name: Generate SHA256SUMS
        # Standalone checksums file users can verify with `Get-FileHash`
        # (PowerShell) or `sha256sum` (Linux/macOS). Lives next to the
        # binaries on the GitHub Release.
        shell: pwsh
        run: |
          Set-Location dist
          $files = Get-ChildItem -File -Include "noidle.exe","noidle.msi"
          $lines = $files | ForEach-Object {
            $h = (Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName).Hash.ToLower()
            "{0}  {1}" -f $h, $_.Name
          }
          $lines | Out-File -Encoding ascii SHA256SUMS.txt -NoNewline
          Add-Content -Path SHA256SUMS.txt -Value ""
          Get-Content SHA256SUMS.txt

      - name: Install cosign
        # Pinned to v3 major; see SECURITY.md HIGH-2 for the action-SHA-
        # pinning roadmap (applies to every external action in this repo,
        # not just this one).
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Sign artifacts with cosign (keyless via GitHub OIDC)
        # Free cryptographic signing — no cert needed. Generates .sig +
        # .pem files alongside each binary, plus a transparency-log entry
        # in Rekor that anyone can audit. Does NOT make Windows
        # SmartScreen happy (that requires Authenticode), but does let
        # security-conscious users verify the binary actually came from
        # this repo's tagged release.
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          Set-Location dist
          foreach ($f in "noidle.exe","noidle.msi","SHA256SUMS.txt") {
            cosign sign-blob --yes --output-signature "$f.sig" --output-certificate "$f.pem" $f
          }
          Get-ChildItem | Format-Table Name, Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: noidle-windows
          path: |
            dist/noidle.exe
            dist/noidle.msi
            dist/SHA256SUMS.txt
            dist/*.sig
            dist/*.pem
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/noidle.exe
            dist/noidle.msi
            dist/SHA256SUMS.txt
            dist/noidle.exe.sig
            dist/noidle.exe.pem
            dist/noidle.msi.sig
            dist/noidle.msi.pem
            dist/SHA256SUMS.txt.sig
            dist/SHA256SUMS.txt.pem
          generate_release_notes: true

      # NOTE: deliberately no `Trigger README auto-update` step here.
      # update-readme.yml triggers on `release: published` directly, so
      # explicitly invoking it (a) duplicated work and (b) required
      # `actions: write` on this job's GITHUB_TOKEN — a permission we now
      # don't need, narrowing the blast radius of any compromise.
