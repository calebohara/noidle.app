name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write   # for cosign keyless signing via GitHub OIDC

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        # PyInstaller is pinned so a breaking PyInstaller release doesn't
        # brick all builds at once. Bump deliberately (test locally first).
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt "pyinstaller==6.11.1"

      - name: Generate icon (if not committed)
        shell: bash
        run: |
          if [ ! -f assets/icon.ico ]; then
            mkdir -p assets
            python scripts/make_icon.py
          fi

      - name: Build with PyInstaller
        # --collect-submodules noidle replaces the brittle hand-maintained list of
        # --hidden-import flags. Adding a new src/noidle/foo.py module is now picked
        # up automatically by the bundle.
        #
        # --add-data "src;src" gets the package source into _MEIPASS/src/ so
        # the script's sys.path.insert at runtime can resolve `import noidle`
        # to the package (the script and package collide on the name `noidle`).
        #
        # We also COPY the entry script to a different name (_pyi_entry.py)
        # before bundling. PyInstaller derives the entry module's name from
        # the input filename; passing noidle.py makes the analyzer register
        # the entry as a module called `noidle`, which shadows the noidle
        # package during dependency analysis. With the script seen as
        # `noidle`, PyInstaller can't follow `from noidle.tray import ...`
        # → tray.py's transitive imports (config.py → json, etc.) never get
        # analyzed → `import json` fails in the bundled config.py at runtime.
        # Renaming the entry only for the build sidesteps the analyzer's
        # name collision without touching the source tree or dev workflow.
        # Output is still noidle.exe via --name.
        shell: pwsh
        run: |
          Copy-Item noidle.py _pyi_entry.py -Force
          # Belt + braces: also explicitly list every stdlib module the
          # noidle package transitively needs as --hidden-import. Run 63ec1dc
          # showed PyInstaller's analyzer still missed json after every other
          # attempt (renaming the entry, --add-data src;src, even appending
          # module-level `import noidle.X` lines to _pyi_entry.py). These
          # flags force inclusion regardless of what the analyzer figures out.
          # Empirically derived from `grep "^import \|^from " src/noidle/*.py`
          # plus inside-function imports (tkinter in whats_new, tomllib +
          # inspect in noidle.py). Update when adding new stdlib deps.
          pyinstaller --onefile --noconsole --name noidle --icon assets/icon.ico `
            --add-data "assets;assets" --add-data "src;src" --paths src `
            --collect-submodules noidle `
            --collect-submodules logging `
            --collect-submodules urllib `
            --collect-submodules tkinter `
            --collect-submodules collections `
            --collect-submodules packaging `
            --collect-all pystray `
            --hidden-import ctypes.wintypes `
            --hidden-import json `
            --hidden-import re `
            --hidden-import dataclasses `
            --hidden-import subprocess `
            --hidden-import webbrowser `
            --hidden-import random `
            --hidden-import tomllib `
            --hidden-import inspect `
            --hidden-import atexit `
            --hidden-import signal `
            --hidden-import importlib `
            --hidden-import logging.handlers `
            _pyi_entry.py

      - name: Exclude dist/ + TEMP from Defender (silent hang fix)
        # Run 7888659 produced 120s of empty stdout/stderr from the smoke
        # .exe: classic signature of Defender real-time scanning blocking
        # an unsigned PyInstaller --onefile bootloader. The bootloader
        # extracts the bundled Python to %TEMP%\_MEI<pid>; AmsiScan on
        # Win Server 2025 runners can stall extraction silently. Exclude
        # both paths so the bootloader can run. Best-effort: we keep
        # going if Add-MpPreference is unavailable.
        shell: pwsh
        run: |
          foreach ($path in @("$pwd\dist", $env:TEMP)) {
            try {
              Add-MpPreference -ExclusionPath $path -ErrorAction Stop
              Write-Host "Defender exclusion added: $path"
            } catch {
              Write-Host "Warning: could not exclude $path from Defender: $_"
            }
          }

      - name: Smoke-test built .exe (--smoke imports everything and exits 0)
        # --noconsole strips stdout from the .exe; we ALSO build a console
        # shim ("noidle-debug.exe") so a smoke failure produces a real
        # diagnostic in the Actions log instead of just an exit code. The
        # debug exe is NOT shipped — it's deleted before artifact upload.
        #
        # timeout-minutes is the job-level fail-safe: a wedged smoke run
        # (e.g. a non-daemon import-time thread keeping the interpreter
        # alive after _smoke() returns) used to burn the full 6h default
        # before failing. Cap at 10m and surface per-process timeouts
        # below so we get logs instead of an empty cancellation.
        timeout-minutes: 10
        shell: pwsh
        env:
          # Force unbuffered stdout/stderr inside the bundled Python so
          # we don't lose diagnostic prints when we kill a hung process.
          PYTHONUNBUFFERED: "1"
          # Enable per-import tracing in _smoke() so if it still hangs
          # after the Defender exclusion, the log tells us which module
          # didn't complete its import (vs. the previous "completely
          # silent" failure mode).
          NOIDLE_SMOKE_TRACE: "1"
        run: |
          $ErrorActionPreference = "Stop"
          $exe = "dist/noidle.exe"
          if (-not (Test-Path $exe)) { Write-Error "Build produced no exe"; exit 1 }

          # Build a parallel console-mode exe purely for capturing smoke output.
          # Hidden-imports list mirrors the main build above; keep in sync.
          pyinstaller --onefile --console --name noidle-debug `
            --add-data "src;src" --paths src `
            --collect-submodules noidle `
            --collect-submodules logging `
            --collect-submodules urllib `
            --collect-submodules tkinter `
            --collect-submodules collections `
            --collect-submodules packaging `
            --collect-all pystray `
            --hidden-import ctypes.wintypes `
            --hidden-import json `
            --hidden-import re `
            --hidden-import dataclasses `
            --hidden-import subprocess `
            --hidden-import webbrowser `
            --hidden-import random `
            --hidden-import tomllib `
            --hidden-import inspect `
            --hidden-import atexit `
            --hidden-import signal `
            --hidden-import importlib `
            --hidden-import logging.handlers `
            _pyi_entry.py
          $dbg = "dist/noidle-debug.exe"
          if (-not (Test-Path $dbg)) { Write-Error "Debug exe build failed"; exit 1 }

          # Run smoke with a hard 120s per-process timeout. Start-Process
          # -Wait blocks indefinitely if the child never exits; using
          # WaitForExit(ms) lets us kill + diagnose a hang instead.
          function Invoke-Smoke($path, $label) {
            $outFile = "smoke-$label-out.txt"
            $errFile = "smoke-$label-err.txt"
            $p = Start-Process -FilePath $path -ArgumentList "--smoke" `
              -PassThru -NoNewWindow `
              -RedirectStandardOutput $outFile -RedirectStandardError $errFile
            if (-not $p.WaitForExit(120000)) {
              try { $p.Kill($true) } catch {}
              Write-Host "--- $label stdout (partial, process hung) ---"
              if (Test-Path $outFile) { Get-Content $outFile }
              Write-Host "--- $label stderr (partial, process hung) ---"
              if (Test-Path $errFile) { Get-Content $errFile }
              # On a silent hang, the most useful evidence is whether
              # the PyInstaller bootloader ever extracted (proves Python
              # at least started) vs. nothing at all (bootloader itself
              # blocked, almost always by AV scanning an unsigned exe).
              Write-Host "--- PyInstaller _MEI* extraction dirs ---"
              Get-ChildItem $env:TEMP -Directory -Filter '_MEI*' -ErrorAction SilentlyContinue |
                Format-Table FullName, LastWriteTime -AutoSize | Out-String | Write-Host
              Write-Host "--- Recent Defender events (last 10 min) ---"
              try {
                Get-WinEvent -LogName 'Microsoft-Windows-Windows Defender/Operational' `
                  -MaxEvents 20 -ErrorAction Stop |
                  Where-Object { $_.TimeCreated -gt (Get-Date).AddMinutes(-10) } |
                  Format-Table TimeCreated, Id, LevelDisplayName, Message -AutoSize |
                  Out-String | Write-Host
              } catch { Write-Host "(Defender event log unavailable: $_)" }
              Write-Error "$path --smoke hung past 120s. Refusing to publish."
              exit 1
            }
            Write-Host "--- $label stdout ---"
            if (Test-Path $outFile) { Get-Content $outFile }
            Write-Host "--- $label stderr ---"
            if (Test-Path $errFile) { Get-Content $errFile }
            Write-Host "$label exit code: $($p.ExitCode)"
            if ($p.ExitCode -ne 0) {
              Write-Error "$path --smoke failed with exit $($p.ExitCode). Refusing to publish."
              exit 1
            }
          }

          Invoke-Smoke $dbg "debug"
          Invoke-Smoke $exe "noconsole"

          # Don't ship the debug exe.
          Remove-Item $dbg -Force

      - name: Compute MSI version
        id: msi_version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            v="${GITHUB_REF#refs/tags/v}"
          else
            v="0.0.0"
          fi
          # WiX requires N.N.N or N.N.N.N — strip any pre-release suffix.
          v="${v%%-*}"
          echo "version=${v}" >> "$GITHUB_OUTPUT"
          echo "Using MSI version: ${v}"

      - name: Install WiX Toolset (pinned to v4; v7 requires OSMF EULA)
        shell: pwsh
        run: dotnet tool install --global wix --version 4.0.5

      - name: Install WiX extensions
        # Version pin must track the WiX 4.0.5 toolset above. The .wxs
        # uses elements from WixToolset.UI.wixext (WixUI dialogs) and
        # WixToolset.Util.wixext (e.g. Util:RemoveFolderEx, registry
        # search helpers). `-g` installs them into the global tool
        # cache so `wix build` can resolve `-ext <name>` below.
        shell: pwsh
        run: |
          wix extension add -g WixToolset.UI.wixext/4.0.5
          wix extension add -g WixToolset.Util.wixext/4.0.5

      - name: Build MSI
        shell: pwsh
        run: |
          $version = "${{ steps.msi_version.outputs.version }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          wix build installer/noidle.wxs -arch x64 -out dist/noidle.msi -d Version=$version `
            -ext WixToolset.UI.wixext -ext WixToolset.Util.wixext
          if (-not (Test-Path "dist/noidle.msi")) {
            Write-Error "WiX did not produce dist/noidle.msi"
            exit 1
          }

      - name: Smoke-test MSI install/uninstall
        # Silent install/uninstall round-trip on the runner. Confirms the
        # MSI lays down its expected artifacts (exe, Start Menu shortcut,
        # installed flag, ARP entry) and removes them cleanly. Also
        # verifies the INSTALLAUTOSTART=0 gating works (Run key NOT created).
        # Property names match installer/noidle.wxs:
        #   WIXUI_EXITDIALOGOPTIONALCHECKBOX=0  suppress launch-after-install
        #   INSTALLAUTOSTART=0                  suppress HKCU Run key
        #   INSTALLDESKTOPSHORTCUT=0            suppress desktop shortcut (already default)
        # perUser MSI — DO NOT elevate; run as the regular runner user.
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $msi = "dist\noidle.msi"
          $installLog = "dist\msi-install.log"
          $uninstallLog = "dist\msi-uninstall.log"

          if (-not (Test-Path $msi)) { Write-Error "MSI missing at $msi"; exit 1 }

          # ---- install ----
          Write-Host "Installing $msi silently..."
          $p = Start-Process -FilePath msiexec.exe `
            -ArgumentList "/i", $msi, "/qn", "/l*v", $installLog, `
              "WIXUI_EXITDIALOGOPTIONALCHECKBOX=0", "INSTALLAUTOSTART=0", "INSTALLDESKTOPSHORTCUT=0" `
            -Wait -PassThru
          Write-Host "msiexec /i exit code: $($p.ExitCode)"
          if ($p.ExitCode -ne 0) {
            Write-Error "MSI install failed (exit $($p.ExitCode))"
            if (Test-Path $installLog) { Get-Content $installLog }
            exit 1
          }

          # ---- verify install artifacts ----
          $installedExe = Join-Path $env:LOCALAPPDATA "Programs\noidle\noidle.exe"
          if (-not (Test-Path $installedExe)) {
            Write-Error "Expected install path missing: $installedExe"
            if (Test-Path $installLog) { Get-Content $installLog }
            exit 1
          }
          Write-Host "Found installed exe: $installedExe"

          $startMenuLnk = Join-Path $env:APPDATA "Microsoft\Windows\Start Menu\Programs\noidle.app\noidle.app.lnk"
          if (-not (Test-Path $startMenuLnk)) {
            Write-Error "Expected Start Menu shortcut missing: $startMenuLnk"
            if (Test-Path $installLog) { Get-Content $installLog }
            exit 1
          }
          Write-Host "Found Start Menu shortcut: $startMenuLnk"

          # Installed-flag DWORD set by the MainExecutable component.
          $installedFlag = Get-ItemProperty -Path "HKCU:\Software\noidle" -Name "installed" -ErrorAction SilentlyContinue
          if (-not $installedFlag -or $installedFlag.installed -ne 1) {
            Write-Error "HKCU\Software\noidle\installed not set to 1 (got: $($installedFlag.installed))"
            if (Test-Path $installLog) { Get-Content $installLog }
            exit 1
          }
          Write-Host "Found HKCU\Software\noidle\installed = 1"

          # Autostart Run key — we passed INSTALLAUTOSTART=0, so the
          # <Condition> on the AutostartRegKey component should suppress it.
          # Verifying its ABSENCE here is what proves the gate property works.
          $runKey = Get-ItemProperty -Path "HKCU:\Software\Microsoft\Windows\CurrentVersion\Run" -Name "noidle" -ErrorAction SilentlyContinue
          if ($runKey) {
            Write-Error "Autostart entry HKCU\...\Run\noidle was created despite INSTALLAUTOSTART=0"
            if (Test-Path $installLog) { Get-Content $installLog }
            exit 1
          }
          Write-Host "Confirmed autostart entry absent (INSTALLAUTOSTART=0 gate works)"

          # ARP entry — perUser installs land in HKCU. ProductCode varies
          # per build, so iterate subkeys and match on DisplayName prefix.
          $arpRoot = "HKCU:\Software\Microsoft\Windows\CurrentVersion\Uninstall"
          $arp = Get-ChildItem $arpRoot -ErrorAction SilentlyContinue |
            ForEach-Object { Get-ItemProperty $_.PSPath -ErrorAction SilentlyContinue } |
            Where-Object { $_.DisplayName -and $_.DisplayName -like 'noidle*' } |
            Select-Object -First 1
          if (-not $arp) {
            Write-Error "No ARP (Uninstall) entry found with DisplayName starting 'noidle' under $arpRoot"
            if (Test-Path $installLog) { Get-Content $installLog }
            exit 1
          }
          Write-Host "ARP DisplayName:    $($arp.DisplayName)"
          Write-Host "ARP DisplayVersion: $($arp.DisplayVersion)"
          Write-Host "ARP Publisher:      $($arp.Publisher)"
          Write-Host "ARP URLInfoAbout:   $($arp.URLInfoAbout)"
          foreach ($field in 'DisplayName','DisplayVersion','Publisher') {
            if (-not $arp.$field) {
              Write-Error "ARP entry missing required field: $field"
              if (Test-Path $installLog) { Get-Content $installLog }
              exit 1
            }
          }

          # ---- uninstall ----
          Write-Host "Uninstalling $msi silently..."
          $p2 = Start-Process -FilePath msiexec.exe `
            -ArgumentList "/x", $msi, "/qn", "/l*v", $uninstallLog `
            -Wait -PassThru
          Write-Host "msiexec /x exit code: $($p2.ExitCode)"
          if ($p2.ExitCode -ne 0) {
            Write-Error "MSI uninstall failed (exit $($p2.ExitCode))"
            if (Test-Path $uninstallLog) { Get-Content $uninstallLog }
            exit 1
          }

          # ---- verify cleanup ----
          if (Test-Path $installedExe) {
            Write-Error "Install path still present after uninstall: $installedExe"
            if (Test-Path $uninstallLog) { Get-Content $uninstallLog }
            exit 1
          }
          $startMenuDir = Split-Path $startMenuLnk -Parent
          if (Test-Path $startMenuDir) {
            Write-Error "Start Menu folder still present after uninstall: $startMenuDir"
            if (Test-Path $uninstallLog) { Get-Content $uninstallLog }
            exit 1
          }
          $installedFlagAfter = Get-ItemProperty -Path "HKCU:\Software\noidle" -Name "installed" -ErrorAction SilentlyContinue
          if ($installedFlagAfter) {
            Write-Error "HKCU\Software\noidle\installed still present after uninstall"
            if (Test-Path $uninstallLog) { Get-Content $uninstallLog }
            exit 1
          }
          Write-Host "MSI install/uninstall smoke test passed."

      - name: Upload MSI logs on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: msi-logs
          path: |
            dist/msi-install.log
            dist/msi-uninstall.log
          if-no-files-found: ignore

      - name: Generate SHA256SUMS
        # Standalone checksums file users can verify with `Get-FileHash`
        # (PowerShell) or `sha256sum` (Linux/macOS). Lives next to the
        # binaries on the GitHub Release.
        # NB: PowerShell's Get-ChildItem -Include is a wildcard filter
        # that requires -Recurse to actually filter; we enumerate
        # explicitly to avoid that gotcha.
        shell: pwsh
        run: |
          Set-Location dist
          $names = "noidle.exe", "noidle.msi"
          $lines = foreach ($name in $names) {
            if (-not (Test-Path -LiteralPath $name)) {
              Write-Error "Expected artifact missing: $name"
              exit 1
            }
            $h = (Get-FileHash -Algorithm SHA256 -LiteralPath $name).Hash.ToLower()
            "{0}  {1}" -f $h, $name
          }
          $content = ($lines -join "`n") + "`n"
          [System.IO.File]::WriteAllText("$pwd/SHA256SUMS.txt", $content)
          $size = (Get-Item SHA256SUMS.txt).Length
          if ($size -lt 100) {
            Write-Error "SHA256SUMS.txt looks empty (size=$size)"
            exit 1
          }
          Get-Content SHA256SUMS.txt
          Write-Host "SHA256SUMS.txt size: $size bytes"

      - name: Install cosign
        # Pinned to v3 major; see SECURITY.md HIGH-2 for the action-SHA-
        # pinning roadmap (applies to every external action in this repo,
        # not just this one).
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac  # v3
        with:
          cosign-release: 'v2.4.1'

      - name: Sign artifacts with cosign (keyless via GitHub OIDC)
        # Free cryptographic signing — no cert needed. Generates .sig +
        # .pem files alongside each binary, plus a transparency-log entry
        # in Rekor that anyone can audit. Does NOT make Windows
        # SmartScreen happy (that requires Authenticode), but does let
        # security-conscious users verify the binary actually came from
        # this repo's tagged release.
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          Set-Location dist
          foreach ($f in "noidle.exe","noidle.msi","SHA256SUMS.txt") {
            cosign sign-blob --yes --output-signature "$f.sig" --output-certificate "$f.pem" $f
          }
          Get-ChildItem | Format-Table Name, Length

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: noidle-windows
          path: |
            dist/noidle.exe
            dist/noidle.msi
            dist/SHA256SUMS.txt
            dist/*.sig
            dist/*.pem
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          files: |
            dist/noidle.exe
            dist/noidle.msi
            dist/SHA256SUMS.txt
            dist/noidle.exe.sig
            dist/noidle.exe.pem
            dist/noidle.msi.sig
            dist/noidle.msi.pem
            dist/SHA256SUMS.txt.sig
            dist/SHA256SUMS.txt.pem
          generate_release_notes: true

      # NOTE: deliberately no `Trigger README auto-update` step here.
      # update-readme.yml triggers on `release: published` directly, so
      # explicitly invoking it (a) duplicated work and (b) required
      # `actions: write` on this job's GITHUB_TOKEN — a permission we now
      # don't need, narrowing the blast radius of any compromise.
