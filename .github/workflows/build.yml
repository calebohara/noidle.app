name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Generate icon (if not committed)
        shell: bash
        run: |
          if [ ! -f assets/icon.ico ]; then
            mkdir -p assets
            python scripts/make_icon.py
          fi

      - name: Build with PyInstaller
        run: pyinstaller --onefile --noconsole --name noidle --icon assets/icon.ico --add-data "assets;assets" --paths src --hidden-import zig --hidden-import zig.tray --hidden-import zig.jiggler --hidden-import zig.winapi --hidden-import zig.activity --hidden-import zig.autostart --hidden-import zig.config --hidden-import zig.hotkey --hidden-import zig.logging_setup --hidden-import zig.stats --hidden-import zig.updater noidle.py

      - name: Smoke-test built .exe (--smoke imports everything and exits 0)
        shell: pwsh
        run: |
          $exe = "dist/noidle.exe"
          if (-not (Test-Path $exe)) { Write-Error "Build produced no exe"; exit 1 }
          $p = Start-Process -FilePath $exe -ArgumentList "--smoke" -Wait -PassThru -NoNewWindow
          Write-Host "Exit code: $($p.ExitCode)"
          if ($p.ExitCode -ne 0) {
            Write-Error "noidle.exe --smoke failed with exit $($p.ExitCode) — startup imports broke. Refusing to publish."
            exit 1
          }

      - name: Compute MSI version
        id: msi_version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            v="${GITHUB_REF#refs/tags/v}"
          else
            v="0.0.0"
          fi
          # WiX requires N.N.N or N.N.N.N — strip any pre-release suffix.
          v="${v%%-*}"
          echo "version=${v}" >> "$GITHUB_OUTPUT"
          echo "Using MSI version: ${v}"

      - name: Install WiX Toolset (pinned to v4; v7 requires OSMF EULA)
        shell: pwsh
        run: dotnet tool install --global wix --version 4.0.5

      - name: Build MSI
        shell: pwsh
        run: |
          $version = "${{ steps.msi_version.outputs.version }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          wix build installer/noidle.wxs -arch x64 -out dist/noidle.msi -d Version=$version
          if (-not (Test-Path "dist/noidle.msi")) {
            Write-Error "WiX did not produce dist/noidle.msi"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: noidle-windows
          path: |
            dist/noidle.exe
            dist/noidle.msi
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/noidle.exe
            dist/noidle.msi
          generate_release_notes: true

      - name: Trigger README auto-update
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run update-readme.yml --repo ${{ github.repository }} --ref main
        shell: bash
