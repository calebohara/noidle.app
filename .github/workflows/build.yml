name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Generate icon (if not committed)
        shell: bash
        run: |
          if [ ! -f assets/icon.ico ]; then
            mkdir -p assets
            python scripts/make_icon.py
          fi

      - name: Build with PyInstaller
        # --collect-submodules zig replaces the brittle hand-maintained list of
        # --hidden-import flags. Adding a new src/zig/foo.py module is now picked
        # up automatically by the bundle (and by the smoke test, which uses
        # pkgutil.iter_modules to mirror the same discovery).
        run: pyinstaller --onefile --noconsole --name noidle --icon assets/icon.ico --add-data "assets;assets" --paths src --collect-submodules zig noidle.py

      - name: Smoke-test built .exe (--smoke imports everything and exits 0)
        # --noconsole strips stdout from the .exe; we ALSO build a console
        # shim ("noidle-debug.exe") so a smoke failure produces a real
        # diagnostic in the Actions log instead of just an exit code. The
        # debug exe is NOT shipped — it's deleted before artifact upload.
        shell: pwsh
        run: |
          $exe = "dist/noidle.exe"
          if (-not (Test-Path $exe)) { Write-Error "Build produced no exe"; exit 1 }

          # Build a parallel console-mode exe purely for capturing smoke output.
          pyinstaller --onefile --console --name noidle-debug --paths src --collect-submodules zig noidle.py
          $dbg = "dist/noidle-debug.exe"
          if (-not (Test-Path $dbg)) { Write-Error "Debug exe build failed"; exit 1 }

          # Run the debug exe so we can see stdout if smoke fails.
          $p = Start-Process -FilePath $dbg -ArgumentList "--smoke" -Wait -PassThru -NoNewWindow -RedirectStandardOutput smoke-out.txt -RedirectStandardError smoke-err.txt
          Write-Host "--- smoke stdout ---"
          if (Test-Path smoke-out.txt) { Get-Content smoke-out.txt }
          Write-Host "--- smoke stderr ---"
          if (Test-Path smoke-err.txt) { Get-Content smoke-err.txt }
          Write-Host "Exit code: $($p.ExitCode)"

          if ($p.ExitCode -ne 0) {
            Write-Error "noidle-debug.exe --smoke failed with exit $($p.ExitCode). Refusing to publish."
            exit 1
          }

          # Sanity: also run the real --noconsole exe and confirm it exits 0.
          $p2 = Start-Process -FilePath $exe -ArgumentList "--smoke" -Wait -PassThru -NoNewWindow
          if ($p2.ExitCode -ne 0) {
            Write-Error "noidle.exe (--noconsole) --smoke failed with exit $($p2.ExitCode). Refusing to publish."
            exit 1
          }

          # Don't ship the debug exe.
          Remove-Item $dbg -Force

      - name: Compute MSI version
        id: msi_version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            v="${GITHUB_REF#refs/tags/v}"
          else
            v="0.0.0"
          fi
          # WiX requires N.N.N or N.N.N.N — strip any pre-release suffix.
          v="${v%%-*}"
          echo "version=${v}" >> "$GITHUB_OUTPUT"
          echo "Using MSI version: ${v}"

      - name: Install WiX Toolset (pinned to v4; v7 requires OSMF EULA)
        shell: pwsh
        run: dotnet tool install --global wix --version 4.0.5

      - name: Build MSI
        shell: pwsh
        run: |
          $version = "${{ steps.msi_version.outputs.version }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          wix build installer/noidle.wxs -arch x64 -out dist/noidle.msi -d Version=$version
          if (-not (Test-Path "dist/noidle.msi")) {
            Write-Error "WiX did not produce dist/noidle.msi"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: noidle-windows
          path: |
            dist/noidle.exe
            dist/noidle.msi
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/noidle.exe
            dist/noidle.msi
          generate_release_notes: true

      # NOTE: deliberately no `Trigger README auto-update` step here.
      # update-readme.yml triggers on `release: published` directly, so
      # explicitly invoking it (a) duplicated work and (b) required
      # `actions: write` on this job's GITHUB_TOKEN — a permission we now
      # don't need, narrowing the blast radius of any compromise.
